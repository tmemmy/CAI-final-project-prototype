<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&amp;display=swap');
    text { font-family: 'Caveat', 'Comic Sans MS', cursive; }
  </style>
  <defs>
    <filter id="pencil" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#FFF9F0" rx="12"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="#2D2D2D" font-size="30" font-weight="700" font-family="Caveat, cursive">Stack: Last In, First Out (LIFO)</text>

  <!-- Card A (bottom of stack) -->
  <g filter="url(#pencil)">
    <path d="M 310 380 Q 312 378 390 377 Q 468 378 490 380 Q 492 382 491 410 Q 490 438 488 440 Q 486 442 390 441 Q 314 442 312 440 Q 310 438 311 410 Z" fill="#5B8FD4" stroke="#2D2D2D" stroke-width="2.5" opacity="0.85"/>
    <text x="400" y="418" text-anchor="middle" fill="#2D2D2D" font-size="32" font-weight="700" font-family="Caveat, cursive">A</text>
  </g>

  <!-- Card B (middle of stack) -->
  <g filter="url(#pencil)">
    <path d="M 308 310 Q 310 308 391 307 Q 470 308 492 310 Q 494 312 493 340 Q 492 368 490 370 Q 488 372 391 371 Q 312 372 310 370 Q 308 368 309 340 Z" fill="#E8785A" stroke="#2D2D2D" stroke-width="2.5" opacity="0.85"/>
    <text x="400" y="348" text-anchor="middle" fill="#2D2D2D" font-size="32" font-weight="700" font-family="Caveat, cursive">B</text>
  </g>

  <!-- Card C (being placed on top) -->
  <g filter="url(#pencil)">
    <path d="M 305 210 Q 307 208 392 207 Q 473 208 495 210 Q 497 212 496 240 Q 495 268 493 270 Q 491 272 392 271 Q 309 272 307 270 Q 305 268 306 240 Z" fill="#F4C554" stroke="#2D2D2D" stroke-width="2.5" opacity="0.85"/>
    <text x="400" y="248" text-anchor="middle" fill="#2D2D2D" font-size="32" font-weight="700" font-family="Caveat, cursive">C</text>
  </g>

  <!-- Surface / table line -->
  <path d="M 260 455 Q 400 458 540 455" stroke="#2D2D2D" stroke-width="2" fill="none" stroke-dasharray="8,4" opacity="0.4"/>

  <!-- Left hand (supporting the stack) -->
  <g filter="url(#pencil)">
    <!-- Palm -->
    <path d="M 230 340 Q 220 330 215 300 Q 212 275 220 260 Q 228 250 240 255 Q 245 240 255 235 Q 265 232 270 242 Q 278 230 290 230 Q 300 232 302 245 Q 302 260 300 280 Q 298 310 295 340 Q 290 370 280 390 Q 270 400 250 400 Q 235 398 230 380 Z" fill="#F5D6C3" stroke="#2D2D2D" stroke-width="2.5" fill-opacity="0.9"/>
    <!-- Finger lines -->
    <path d="M 240 260 Q 242 270 243 280" stroke="#2D2D2D" stroke-width="1.2" fill="none" opacity="0.5"/>
    <path d="M 265 245 Q 267 258 268 270" stroke="#2D2D2D" stroke-width="1.2" fill="none" opacity="0.5"/>
    <path d="M 288 248 Q 290 260 291 272" stroke="#2D2D2D" stroke-width="1.2" fill="none" opacity="0.5"/>
  </g>

  <!-- Right hand (placing card C) -->
  <g filter="url(#pencil)">
    <!-- Palm and fingers -->
    <path d="M 500 180 Q 510 170 525 168 Q 540 170 548 180 Q 555 168 565 165 Q 578 167 582 178 Q 590 170 600 170 Q 612 174 612 188 Q 618 184 625 188 Q 632 194 628 210 Q 625 230 615 250 Q 608 265 595 280 Q 580 295 560 300 Q 540 302 520 295 Q 510 288 505 270 Q 500 250 498 230 Q 497 210 500 180 Z" fill="#F5D6C3" stroke="#2D2D2D" stroke-width="2.5" fill-opacity="0.9"/>
    <!-- Finger creases -->
    <path d="M 530 178 Q 532 190 533 200" stroke="#2D2D2D" stroke-width="1.2" fill="none" opacity="0.5"/>
    <path d="M 562 175 Q 564 188 565 198" stroke="#2D2D2D" stroke-width="1.2" fill="none" opacity="0.5"/>
    <path d="M 595 180 Q 596 192 596 200" stroke="#2D2D2D" stroke-width="1.2" fill="none" opacity="0.5"/>
    <!-- Thumb -->
    <path d="M 500 220 Q 488 225 480 235 Q 476 245 480 250 Q 486 252 495 245" stroke="#2D2D2D" stroke-width="2.5" fill="#F5D6C3" fill-opacity="0.9"/>
  </g>

  <!-- Connection line from hand to card -->
  <path d="M 520 298 Q 500 300 497 270 Q 497 260 495 250" stroke="#2D2D2D" stroke-width="1.5" fill="none" stroke-dasharray="5,3" opacity="0.4"/>

  <!-- Push arrow (left side) -->
  <g>
    <path d="M 190 170 Q 188 220 190 290" stroke="#7DB87D" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 182 280 L 190 298 L 198 280" fill="#7DB87D" stroke="#7DB87D" stroke-width="2"/>
    <text x="175" y="240" text-anchor="middle" fill="#7DB87D" font-size="24" font-weight="700" font-family="Caveat, cursive" transform="rotate(-90, 175, 240)">push</text>
  </g>

  <!-- Pop arrow (right side) -->
  <g>
    <path d="M 620 290 Q 618 220 620 170" stroke="#E8785A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 612 180 L 620 162 L 628 180" fill="#E8785A" stroke="#E8785A" stroke-width="2"/>
    <text x="640" y="240" text-anchor="middle" fill="#E8785A" font-size="24" font-weight="700" font-family="Caveat, cursive" transform="rotate(90, 640, 240)">pop</text>
  </g>

  <!-- Small annotation labels -->
  <text x="540" y="440" fill="#2D2D2D" font-size="18" font-family="Caveat, cursive" opacity="0.6">bottom</text>
  <path d="M 530 435 Q 500 435 495 430" stroke="#2D2D2D" stroke-width="1" fill="none" opacity="0.4"/>

  <text x="540" y="210" fill="#2D2D2D" font-size="18" font-family="Caveat, cursive" opacity="0.6">top (newest)</text>
  <path d="M 530 205 Q 505 205 498 210" stroke="#2D2D2D" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Decorative dots -->
  <circle cx="150" cy="460" r="3" fill="#F4C554" opacity="0.5"/>
  <circle cx="165" cy="470" r="2" fill="#5B8FD4" opacity="0.5"/>
  <circle cx="650" cy="460" r="3" fill="#E8785A" opacity="0.5"/>
  <circle cx="670" cy="450" r="2" fill="#7DB87D" opacity="0.5"/>
</svg>