<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&amp;display=swap');
    text { font-family: 'Caveat', 'Comic Sans MS', cursive; }
  </style>
  <defs>
    <filter id="pencil" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#FFF9F0" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" fill="#2D2D2D" font-size="30" font-weight="700" font-family="Caveat, cursive">Sorting: Comparing &amp; Swapping</text>

  <!-- LEFT HAND holding "7" strip -->
  <g filter="url(#pencil)">
    <path d="M 140 120 Q 130 110 125 90 Q 122 70 128 58 Q 136 48 148 54 Q 152 40 162 36 Q 174 34 178 44 Q 186 34 196 34 Q 208 38 208 52 Q 210 38 220 38 Q 230 42 230 58 Q 232 78 228 100 Q 224 130 218 155 Q 210 175 195 190 Q 180 200 160 198 Q 145 194 140 178 Q 136 160 138 140 Z" fill="#F5D6C3" stroke="#2D2D2D" stroke-width="2.5" fill-opacity="0.9"/>
    <path d="M 148 58 Q 150 70 152 80" stroke="#2D2D2D" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M 176 46 Q 178 58 179 68" stroke="#2D2D2D" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M 200 48 Q 202 60 203 68" stroke="#2D2D2D" stroke-width="1" fill="none" opacity="0.4"/>
  </g>

  <!-- Paper strip "7" held by left hand -->
  <g filter="url(#pencil)">
    <path d="M 198 130 Q 200 126 260 125 Q 320 126 322 130 Q 324 134 323 170 Q 322 206 320 210 Q 318 214 260 213 Q 202 214 200 210 Q 198 206 199 170 Z" fill="#E8785A" stroke="#2D2D2D" stroke-width="2.5" opacity="0.9"/>
    <text x="260" y="182" text-anchor="middle" fill="#2D2D2D" font-size="42" font-weight="700" font-family="Caveat, cursive">7</text>
  </g>

  <!-- RIGHT HAND holding "3" strip -->
  <g filter="url(#pencil)">
    <path d="M 580 120 Q 590 110 605 106 Q 620 108 626 118 Q 634 108 644 104 Q 656 108 658 120 Q 666 112 676 114 Q 686 120 684 136 Q 690 132 698 136 Q 704 144 700 160 Q 696 180 688 200 Q 680 218 666 230 Q 650 242 630 242 Q 612 240 600 230 Q 590 220 585 200 Q 580 180 578 160 Q 577 140 580 120 Z" fill="#F5D6C3" stroke="#2D2D2D" stroke-width="2.5" fill-opacity="0.9"/>
    <path d="M 612 116 Q 614 128 615 138" stroke="#2D2D2D" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M 640 112 Q 642 124 643 134" stroke="#2D2D2D" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M 668 120 Q 669 132 669 140" stroke="#2D2D2D" stroke-width="1" fill="none" opacity="0.4"/>
  </g>

  <!-- Paper strip "3" held by right hand -->
  <g filter="url(#pencil)">
    <path d="M 478 130 Q 480 126 540 125 Q 600 126 602 130 Q 604 134 603 170 Q 602 206 600 210 Q 598 214 540 213 Q 482 214 480 210 Q 478 206 479 170 Z" fill="#5B8FD4" stroke="#2D2D2D" stroke-width="2.5" opacity="0.9"/>
    <text x="540" y="182" text-anchor="middle" fill="#2D2D2D" font-size="42" font-weight="700" font-family="Caveat, cursive">3</text>
  </g>

  <!-- Swap arrows between the two strips -->
  <g>
    <!-- Arrow from 7 to 3 (top arc) -->
    <path d="M 325 150 Q 400 100 475 150" stroke="#F4C554" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 465 142 L 478 150 L 468 158" fill="#F4C554" stroke="#F4C554" stroke-width="2"/>
    <!-- Arrow from 3 to 7 (bottom arc) -->
    <path d="M 475 190 Q 400 240 325 190" stroke="#F4C554" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 335 198 L 322 190 L 332 182" fill="#F4C554" stroke="#F4C554" stroke-width="2"/>
    <!-- "swap!" label -->
    <text x="400" y="175" text-anchor="middle" fill="#F4C554" font-size="22" font-weight="700" font-family="Caveat, cursive">swap!</text>
  </g>

  <!-- Divider line -->
  <path d="M 100 290 Q 400 285 700 290" stroke="#2D2D2D" stroke-width="1.5" fill="none" stroke-dasharray="8,5" opacity="0.3"/>
  <text x="400" y="315" text-anchor="middle" fill="#2D2D2D" font-size="20" font-family="Caveat, cursive" opacity="0.6">cards laid out on the table:</text>

  <!-- Row of cards on the table -->
  <!-- Card: 3 (highlighted - being compared) -->
  <g filter="url(#pencil)">
    <path d="M 128 340 Q 130 336 180 335 Q 230 336 232 340 Q 234 344 233 385 Q 232 426 230 430 Q 228 434 180 433 Q 132 434 130 430 Q 128 426 129 385 Z" fill="#5B8FD4" stroke="#2D2D2D" stroke-width="2.5" opacity="0.9"/>
    <text x="180" y="396" text-anchor="middle" fill="#2D2D2D" font-size="38" font-weight="700" font-family="Caveat, cursive">3</text>
    <!-- Highlight glow -->
    <path d="M 126 338 Q 128 334 180 333 Q 234 334 236 338 Q 238 342 237 385 Q 236 428 234 432 Q 232 436 180 435 Q 130 436 128 432 Q 126 428 127 385 Z" fill="none" stroke="#F4C554" stroke-width="3" opacity="0.6" stroke-dasharray="6,3"/>
  </g>

  <!-- Card: 7 (highlighted - being compared) -->
  <g filter="url(#pencil)">
    <path d="M 258 340 Q 260 336 310 335 Q 360 336 362 340 Q 364 344 363 385 Q 362 426 360 430 Q 358 434 310 433 Q 262 434 260 430 Q 258 426 259 385 Z" fill="#E8785A" stroke="#2D2D2D" stroke-width="2.5" opacity="0.9"/>
    <text x="310" y="396" text-anchor="middle" fill="#2D2D2D" font-size="38" font-weight="700" font-family="Caveat, cursive">7</text>
    <!-- Highlight glow -->
    <path d="M 256 338 Q 258 334 310 333 Q 364 334 366 338 Q 368 342 367 385 Q 366 428 364 432 Q 362 436 310 435 Q 260 436 258 432 Q 256 428 257 385 Z" fill="none" stroke="#F4C554" stroke-width="3" opacity="0.6" stroke-dasharray="6,3"/>
  </g>

  <!-- Comparison bracket -->
  <path d="M 175 445 Q 175 460 245 460 Q 315 460 315 445" stroke="#F4C554" stroke-width="2.5" fill="none"/>
  <text x="245" y="480" text-anchor="middle" fill="#F4C554" font-size="18" font-weight="700" font-family="Caveat, cursive">7 > 3? swap!</text>

  <!-- Card: 5 -->
  <g filter="url(#pencil)">
    <path d="M 388 340 Q 390 336 440 335 Q 490 336 492 340 Q 494 344 493 385 Q 492 426 490 430 Q 488 434 440 433 Q 392 434 390 430 Q 388 426 389 385 Z" fill="#FFF9F0" stroke="#2D2D2D" stroke-width="2.5" opacity="0.9"/>
    <text x="440" y="396" text-anchor="middle" fill="#2D2D2D" font-size="38" font-weight="700" font-family="Caveat, cursive">5</text>
  </g>

  <!-- Card: 1 -->
  <g filter="url(#pencil)">
    <path d="M 518 340 Q 520 336 570 335 Q 620 336 622 340 Q 624 344 623 385 Q 622 426 620 430 Q 618 434 570 433 Q 522 434 520 430 Q 518 426 519 385 Z" fill="#FFF9F0" stroke="#2D2D2D" stroke-width="2.5" opacity="0.9"/>
    <text x="570" y="396" text-anchor="middle" fill="#2D2D2D" font-size="38" font-weight="700" font-family="Caveat, cursive">1</text>
  </g>

  <!-- Card: 9 -->
  <g filter="url(#pencil)">
    <path d="M 648 340 Q 650 336 700 335 Q 750 336 752 340 Q 754 344 753 385 Q 752 426 750 430 Q 748 434 700 433 Q 652 434 650 430 Q 648 426 649 385 Z" fill="#FFF9F0" stroke="#2D2D2D" stroke-width="2.5" opacity="0.9"/>
    <text x="700" y="396" text-anchor="middle" fill="#2D2D2D" font-size="38" font-weight="700" font-family="Caveat, cursive">9</text>
  </g>

  <!-- Small index markers under each card -->
  <text x="180" y="450" text-anchor="middle" fill="#2D2D2D" font-size="14" font-family="Caveat, cursive" opacity="0.4">[0]</text>
  <text x="310" y="450" text-anchor="middle" fill="#2D2D2D" font-size="14" font-family="Caveat, cursive" opacity="0.4">[1]</text>
  <text x="440" y="450" text-anchor="middle" fill="#2D2D2D" font-size="14" font-family="Caveat, cursive" opacity="0.4">[2]</text>
  <text x="570" y="450" text-anchor="middle" fill="#2D2D2D" font-size="14" font-family="Caveat, cursive" opacity="0.4">[3]</text>
  <text x="700" y="450" text-anchor="middle" fill="#2D2D2D" font-size="14" font-family="Caveat, cursive" opacity="0.4">[4]</text>
</svg>