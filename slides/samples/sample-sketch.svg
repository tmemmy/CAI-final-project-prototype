<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&amp;display=swap');
    text { font-family: 'Caveat', cursive; }
  </style>
  <defs>
    <pattern id="graph" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#C8D8E8" stroke-width="0.3"/>
    </pattern>
    <pattern id="hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#888" stroke-width="0.8" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Sketch paper background -->
  <rect width="500" height="350" fill="#F5F3EE"/>
  <rect width="500" height="350" fill="url(#graph)" opacity="0.4"/>

  <!-- Title -->
  <text x="250" y="32" text-anchor="middle" fill="#444" font-size="22" font-weight="700" style="letter-spacing:1px">Stack: LIFO</text>

  <!-- Shadow/crosshatch under stack -->
  <rect x="168" y="275" width="130" height="30" rx="4" fill="url(#hatch)" opacity="0.5"/>

  <!-- Card A (bottom) - pencil sketch -->
  <g>
    <path d="M 160 240 Q 162 237 230 236 Q 298 237 300 240 Q 302 243 301 268 Q 300 293 298 296 Q 296 299 230 298 Q 164 299 162 296 Q 160 293 161 268 Z" fill="#F0EEEA" stroke="#555" stroke-width="2.8"/>
    <!-- sketch lines (multiple strokes for pencil effect) -->
    <path d="M 160 240 Q 163 238 230 237" stroke="#666" stroke-width="0.6" fill="none" opacity="0.3"/>
    <text x="230" y="278" text-anchor="middle" fill="#333" font-size="30" font-weight="700">A</text>
    <!-- crosshatch shading on right edge -->
    <path d="M 285 245 L 295 255 M 285 255 L 295 265 M 285 265 L 295 275 M 285 275 L 295 285" stroke="#888" stroke-width="0.7" opacity="0.25"/>
  </g>

  <!-- Card B (middle) -->
  <g>
    <path d="M 158 178 Q 160 175 231 174 Q 300 175 302 178 Q 304 181 303 206 Q 302 231 300 234 Q 298 237 231 236 Q 162 237 160 234 Q 158 231 159 206 Z" fill="#ECEAE5" stroke="#555" stroke-width="2.8"/>
    <path d="M 159 178 Q 161 176 231 175" stroke="#666" stroke-width="0.6" fill="none" opacity="0.3"/>
    <text x="231" y="216" text-anchor="middle" fill="#333" font-size="30" font-weight="700">B</text>
    <path d="M 287 183 L 297 193 M 287 193 L 297 203 M 287 203 L 297 213 M 287 213 L 297 223" stroke="#888" stroke-width="0.7" opacity="0.25"/>
  </g>

  <!-- Card C (top, being placed) - slightly tilted -->
  <g transform="rotate(-3, 230, 155)">
    <path d="M 156 118 Q 158 115 230 114 Q 302 115 304 118 Q 306 121 305 146 Q 304 171 302 174 Q 300 177 230 176 Q 160 177 158 174 Q 156 171 157 146 Z" fill="#F2F0EB" stroke="#555" stroke-width="2.8"/>
    <path d="M 157 118 Q 159 116 230 115" stroke="#666" stroke-width="0.6" fill="none" opacity="0.3"/>
    <text x="230" y="156" text-anchor="middle" fill="#333" font-size="30" font-weight="700">C</text>
    <path d="M 289 123 L 299 133 M 289 133 L 299 143 M 289 143 L 299 153 M 289 153 L 299 163" stroke="#888" stroke-width="0.7" opacity="0.25"/>
  </g>

  <!-- Small sketchy hand (top right, placing C) -->
  <g transform="translate(300, 80) scale(0.5)">
    <path d="M 20 80 Q 10 60 15 40 Q 20 25 30 30 Q 32 18 42 15 Q 52 18 52 28 Q 58 16 68 18 Q 76 24 74 38 Q 80 22 88 26 Q 94 34 90 50 Q 86 70 80 90 Q 74 108 60 118 Q 44 124 30 118 Q 20 110 20 96 Z" fill="none" stroke="#555" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- second outline for sketch effect -->
    <path d="M 22 78 Q 12 58 17 42 Q 22 28 31 32" stroke="#777" stroke-width="1" fill="none" opacity="0.3"/>
    <path d="M 52 30 Q 59 18 69 20" stroke="#777" stroke-width="1" fill="none" opacity="0.3"/>
  </g>

  <!-- Push arrow (pencil style, blue accent) -->
  <g>
    <path d="M 100 130 Q 98 180 100 260" stroke="#4A7AB5" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-dasharray="8,4"/>
    <path d="M 93 250 L 100 270 L 107 250" fill="none" stroke="#4A7AB5" stroke-width="2.5" stroke-linecap="round"/>
    <text x="72" y="200" fill="#4A7AB5" font-size="18" font-weight="700" transform="rotate(-90, 72, 200)">push</text>
  </g>

  <!-- Pop arrow (red accent) -->
  <g>
    <path d="M 370 260 Q 368 180 370 130" stroke="#B54A4A" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-dasharray="8,4"/>
    <path d="M 363 140 L 370 120 L 377 140" fill="none" stroke="#B54A4A" stroke-width="2.5" stroke-linecap="round"/>
    <text x="395" y="200" fill="#B54A4A" font-size="18" font-weight="700" transform="rotate(90, 395, 200)">pop</text>
  </g>

  <!-- Pencil annotations -->
  <text x="340" y="290" fill="#777" font-size="14" transform="rotate(-2, 340, 290)">bottom</text>
  <path d="M 335 285 Q 315 284 305 288" stroke="#777" stroke-width="0.8" fill="none"/>
  <text x="340" y="125" fill="#777" font-size="14" transform="rotate(1, 340, 125)">top (new)</text>
  <path d="M 335 120 Q 315 120 308 122" stroke="#777" stroke-width="0.8" fill="none"/>

  <!-- Style label -->
  <text x="250" y="340" text-anchor="middle" fill="#999" font-size="14">Style 1: Detailed Sketch</text>
</svg>