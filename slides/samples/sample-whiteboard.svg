<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&amp;display=swap');
    text { font-family: 'Caveat', cursive; }
  </style>
  <defs>
    <pattern id="grid-dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.8" fill="#C0C8D0" opacity="0.4"/>
    </pattern>
    <!-- Whiteboard sheen -->
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFA"/>
      <stop offset="40%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F2F5F5"/>
    </linearGradient>
  </defs>

  <!-- Whiteboard background -->
  <rect width="500" height="350" fill="url(#sheen)" rx="4"/>
  <rect width="500" height="350" fill="url(#grid-dots)"/>
  <!-- Whiteboard border/frame -->
  <rect x="2" y="2" width="496" height="346" rx="4" fill="none" stroke="#D0D5DA" stroke-width="3"/>

  <!-- Faint erased content (ghost of previous drawing) -->
  <rect x="340" y="200" width="80" height="40" rx="3" fill="none" stroke="#E0E3E6" stroke-width="2" opacity="0.4"/>
  <text x="380" y="225" text-anchor="middle" fill="#E0E3E6" font-size="20" font-weight="700" opacity="0.3">X</text>
  <path d="M 340 200 L 420 240 M 340 240 L 420 200" stroke="#E0E3E6" stroke-width="1.5" opacity="0.2"/>

  <!-- Title (black marker) -->
  <text x="250" y="38" text-anchor="middle" fill="#222" font-size="24" font-weight="700">Stack: LIFO</text>
  <!-- Underline stroke -->
  <path d="M 170 42 Q 250 44 330 42" stroke="#222" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Card A (bottom) - blue marker -->
  <g>
    <rect x="168" y="232" width="130" height="52" rx="3" fill="#D6E8F8" fill-opacity="0.5" stroke="#2563EB" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="233" y="267" text-anchor="middle" fill="#2563EB" font-size="30" font-weight="700">A</text>
  </g>

  <!-- Card B (middle) - green marker -->
  <g>
    <rect x="168" y="174" width="130" height="52" rx="3" fill="#D6F0D6" fill-opacity="0.5" stroke="#16A34A" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="233" y="209" text-anchor="middle" fill="#16A34A" font-size="30" font-weight="700">B</text>
  </g>

  <!-- Card C (top) - red marker -->
  <g>
    <rect x="168" y="116" width="130" height="52" rx="3" fill="#F8D6D6" fill-opacity="0.5" stroke="#DC2626" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="233" y="151" text-anchor="middle" fill="#DC2626" font-size="30" font-weight="700">C</text>
  </g>

  <!-- Simple stick-figure hand (black marker) -->
  <g>
    <!-- Arm line -->
    <path d="M 340 90 Q 320 95 302 110" stroke="#222" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Simple hand shape -->
    <path d="M 302 110 Q 295 105 290 112 Q 288 118 295 120 Q 298 115 302 110" stroke="#222" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Fingers -->
    <path d="M 290 112 Q 285 106 288 100 M 295 108 Q 292 100 295 94 M 300 108 Q 300 100 303 95" stroke="#222" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Push arrow (blue marker) -->
  <g>
    <path d="M 110 130 L 110 270" stroke="#2563EB" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M 103 258 L 110 278 L 117 258" fill="none" stroke="#2563EB" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="86" y="205" fill="#2563EB" font-size="20" font-weight="700" transform="rotate(-90, 86, 205)">push</text>
  </g>

  <!-- Pop arrow (red marker) -->
  <g>
    <path d="M 362 270 L 362 130" stroke="#DC2626" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M 355 142 L 362 122 L 369 142" fill="none" stroke="#DC2626" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="386" y="205" fill="#DC2626" font-size="20" font-weight="700" transform="rotate(90, 386, 205)">pop</text>
  </g>

  <!-- Marker annotations -->
  <text x="310" y="296" fill="#222" font-size="16" font-weight="700">bottom</text>
  <path d="M 300 292 Q 285 290 270 290" stroke="#222" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <text x="310" y="128" fill="#222" font-size="16" font-weight="700">top</text>
  <path d="M 305 124 Q 295 122 285 124" stroke="#222" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Small "LIFO" circled in corner (green marker) -->
  <ellipse cx="430" cy="60" rx="42" ry="22" fill="none" stroke="#16A34A" stroke-width="2.5"/>
  <text x="430" y="66" text-anchor="middle" fill="#16A34A" font-size="16" font-weight="700">L.I.F.O.</text>

  <!-- Style label -->
  <text x="250" y="340" text-anchor="middle" fill="#B0B5BA" font-size="14">Style 3: Technical Whiteboard</text>
</svg>