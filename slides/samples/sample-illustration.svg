<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&amp;display=swap');
    text { font-family: 'Nunito', sans-serif; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFCF7"/>
      <stop offset="100%" stop-color="#F5EDE0"/>
    </linearGradient>
    <filter id="soft-shadow">
      <feDropShadow dx="1" dy="3" stdDeviation="4" flood-color="#4A3728" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="card-a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ECBC0"/>
      <stop offset="100%" stop-color="#6BB8AD"/>
    </linearGradient>
    <linearGradient id="card-b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5B895"/>
      <stop offset="100%" stop-color="#E8A580"/>
    </linearGradient>
    <linearGradient id="card-c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C4B3E0"/>
      <stop offset="100%" stop-color="#B3A0D0"/>
    </linearGradient>
  </defs>

  <!-- Warm gradient background -->
  <rect width="500" height="350" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="250" y="34" text-anchor="middle" fill="#4A3728" font-size="20" font-weight="800">Stack: Last In, First Out</text>

  <!-- Card A (bottom) -->
  <g filter="url(#soft-shadow)">
    <rect x="170" y="230" width="130" height="55" rx="12" fill="url(#card-a)" stroke="#4A3728" stroke-width="1.5"/>
    <text x="235" y="265" text-anchor="middle" fill="white" font-size="26" font-weight="800">A</text>
  </g>

  <!-- Card B (middle) -->
  <g filter="url(#soft-shadow)">
    <rect x="170" y="168" width="130" height="55" rx="12" fill="url(#card-b)" stroke="#4A3728" stroke-width="1.5"/>
    <text x="235" y="203" text-anchor="middle" fill="white" font-size="26" font-weight="800">B</text>
  </g>

  <!-- Card C (top, being placed) -->
  <g filter="url(#soft-shadow)">
    <rect x="170" y="106" width="130" height="55" rx="12" fill="url(#card-c)" stroke="#4A3728" stroke-width="1.5"/>
    <text x="235" y="141" text-anchor="middle" fill="white" font-size="26" font-weight="800">C</text>
  </g>

  <!-- Small polished hand placing C -->
  <g transform="translate(298, 68) scale(0.45)">
    <path d="M 30 100 Q 18 75 22 50 Q 26 30 38 35 Q 40 18 52 14 Q 64 16 64 30 Q 70 15 82 17 Q 92 24 88 42 Q 96 28 106 32 Q 112 42 108 58 Q 104 80 96 100 Q 88 118 72 126 Q 54 130 40 122 Q 28 114 28 100 Z" fill="#F5D6C3" stroke="#4A3728" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <!-- Connection from hand to card -->
  <path d="M 310 108 Q 305 100 302 94" stroke="#4A3728" stroke-width="1" fill="none" opacity="0.2" stroke-dasharray="3,3"/>

  <!-- Push arrow (soft teal) -->
  <g>
    <path d="M 115 120 Q 113 175 115 265" stroke="#7ECBC0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 109 255 L 115 273 L 121 255" fill="#7ECBC0" stroke="#7ECBC0" stroke-width="2"/>
    <text x="92" y="198" fill="#7ECBC0" font-size="13" font-weight="700" transform="rotate(-90, 92, 198)">push</text>
  </g>

  <!-- Pop arrow (warm peach) -->
  <g>
    <path d="M 360 265 Q 358 175 360 120" stroke="#F5B895" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 354 130 L 360 112 L 366 130" fill="#F5B895" stroke="#F5B895" stroke-width="2"/>
    <text x="382" y="198" fill="#F5B895" font-size="13" font-weight="700" transform="rotate(90, 382, 198)">pop</text>
  </g>

  <!-- Soft labels -->
  <g>
    <rect x="320" y="268" width="58" height="20" rx="10" fill="#A8C9A5" opacity="0.3"/>
    <text x="349" y="282" text-anchor="middle" fill="#5A7A58" font-size="11" font-weight="700">bottom</text>
  </g>
  <g>
    <rect x="320" y="110" width="38" height="20" rx="10" fill="#C4B3E0" opacity="0.3"/>
    <text x="339" y="124" text-anchor="middle" fill="#6B5A8A" font-size="11" font-weight="700">top</text>
  </g>

  <!-- Decorative dots -->
  <circle cx="60" cy="310" r="5" fill="#F5B895" opacity="0.3"/>
  <circle cx="75" cy="318" r="3" fill="#7ECBC0" opacity="0.3"/>
  <circle cx="430" cy="305" r="4" fill="#C4B3E0" opacity="0.3"/>
  <circle cx="445" cy="315" r="6" fill="#A8C9A5" opacity="0.2"/>

  <!-- Style label -->
  <text x="250" y="340" text-anchor="middle" fill="#B5A898" font-size="12" font-weight="600">Style 2: Soft Illustration</text>
</svg>