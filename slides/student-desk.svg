<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320" width="420" height="320">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&amp;display=swap');
    text { font-family: 'Caveat', cursive; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFCF7"/>
      <stop offset="100%" stop-color="#F5EDE0"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/></filter>
  </defs>

  <rect width="420" height="320" fill="url(#bg)" rx="8"/>

  <!-- Desk surface -->
  <path d="M 40 210 Q 210 205 380 210 L 390 280 Q 210 285 30 280 Z" fill="#D4B896" stroke="#A08060" stroke-width="1.5" opacity="0.6"/>
  <path d="M 40 210 Q 210 205 380 210" stroke="#A08060" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Large paper sheet on desk -->
  <g filter="url(#shadow)">
    <rect x="100" y="195" width="140" height="70" rx="2" fill="white" stroke="#bbb" stroke-width="0.5" transform="rotate(-3, 170, 230)"/>
    <!-- Lines on paper -->
    <line x1="108" y1="210" x2="232" y2="208" stroke="#B8C8D8" stroke-width="0.4" opacity="0.5"/>
    <line x1="108" y1="220" x2="232" y2="218" stroke="#B8C8D8" stroke-width="0.4" opacity="0.5"/>
    <line x1="108" y1="230" x2="232" y2="228" stroke="#B8C8D8" stroke-width="0.4" opacity="0.5"/>
    <line x1="108" y1="240" x2="232" y2="238" stroke="#B8C8D8" stroke-width="0.4" opacity="0.5"/>
    <!-- Written algorithm steps -->
    <text x="115" y="218" fill="#555" font-size="8" font-family="Caveat, cursive" opacity="0.7">push(A) -> top = 0</text>
    <text x="115" y="228" fill="#555" font-size="8" font-family="Caveat, cursive" opacity="0.7">push(B) -> top = 1</text>
    <text x="115" y="238" fill="#555" font-size="8" font-family="Caveat, cursive" opacity="0.7">pop() -> returns B</text>
  </g>

  <!-- Cut paper cards scattered -->
  <g filter="url(#shadow)">
    <rect x="260" y="200" width="32" height="25" rx="2" fill="#D6E4F0" stroke="#bbb" stroke-width="0.5" transform="rotate(8, 276, 212)"/>
    <text x="276" y="218" text-anchor="middle" fill="#2D2D2D" font-size="16" font-weight="700" font-family="Caveat, cursive">A</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="295" y="208" width="32" height="25" rx="2" fill="#F0D6D6" stroke="#bbb" stroke-width="0.5" transform="rotate(-5, 311, 220)"/>
    <text x="311" y="226" text-anchor="middle" fill="#2D2D2D" font-size="16" font-weight="700" font-family="Caveat, cursive">B</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="278" y="228" width="32" height="25" rx="2" fill="#F0ECD6" stroke="#bbb" stroke-width="0.5" transform="rotate(3, 294, 240)"/>
    <text x="294" y="246" text-anchor="middle" fill="#2D2D2D" font-size="16" font-weight="700" font-family="Caveat, cursive">C</text>
  </g>

  <!-- Stacked cards (the "stack") -->
  <g filter="url(#shadow)">
    <rect x="322" y="232" width="32" height="22" rx="2" fill="#D6F0D6" stroke="#bbb" stroke-width="0.5"/>
    <text x="338" y="248" text-anchor="middle" fill="#2D2D2D" font-size="14" font-weight="700" font-family="Caveat, cursive">1</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="321" y="218" width="32" height="22" rx="2" fill="#D6E4F0" stroke="#bbb" stroke-width="0.5"/>
    <text x="337" y="234" text-anchor="middle" fill="#2D2D2D" font-size="14" font-weight="700" font-family="Caveat, cursive">2</text>
  </g>

  <!-- Scissors -->
  <g transform="translate(68, 225) rotate(-25)">
    <path d="M 0 0 L 30 12" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 0 12 L 30 0" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="-2" cy="0" r="5" fill="none" stroke="#E8785A" stroke-width="1.5"/>
    <circle cx="-2" cy="12" r="5" fill="none" stroke="#E8785A" stroke-width="1.5"/>
    <circle cx="15" cy="6" r="3" fill="#999" opacity="0.3"/>
  </g>

  <!-- Pen -->
  <g transform="translate(240, 250) rotate(15)">
    <rect x="0" y="0" width="45" height="5" rx="1" fill="#4A5568"/>
    <path d="M 45 0 L 52 2.5 L 45 5" fill="#2D2D2D"/>
    <rect x="0" y="0" width="8" height="5" rx="1" fill="#C0785A"/>
  </g>

  <!-- Bowl (small, on the side) -->
  <g transform="translate(55, 200)">
    <path d="M 0 8 Q 12 25 24 8" stroke="#A08060" stroke-width="1.5" fill="#F5EDE0" opacity="0.8"/>
    <ellipse cx="12" cy="8" rx="13" ry="4" fill="#E8DCC8" stroke="#A08060" stroke-width="1.5"/>
    <!-- Sticky note on bowl -->
    <rect x="3" y="-2" width="18" height="12" rx="1" fill="#F5E8A0" stroke="#E0D080" stroke-width="0.5" transform="rotate(-8, 12, 4)"/>
    <text x="12" y="7" text-anchor="middle" fill="#555" font-size="6" font-family="Caveat, cursive">sum(3)</text>
  </g>

  <!-- Tape roll -->
  <g transform="translate(340, 195)">
    <circle cx="10" cy="10" r="10" fill="#F5E8A0" opacity="0.5" stroke="#E0D080" stroke-width="1"/>
    <circle cx="10" cy="10" r="4" fill="white" stroke="#E0D080" stroke-width="0.8"/>
  </g>

  <!-- Student (simple, from behind/side, looking down at desk) -->
  <!-- Head -->
  <ellipse cx="200" cy="130" rx="28" ry="30" fill="#F5D6C3" stroke="#C0A08A" stroke-width="1.5"/>
  <!-- Hair -->
  <path d="M 172 125 Q 172 95 200 90 Q 228 95 228 125" fill="#4A3728" stroke="#3A2718" stroke-width="1"/>
  <path d="M 172 125 Q 170 135 174 140" fill="#4A3728" stroke="none"/>
  <path d="M 228 125 Q 230 135 226 140" fill="#4A3728" stroke="none"/>
  <!-- Ponytail -->
  <path d="M 215 95 Q 240 90 245 110 Q 248 130 240 148" stroke="#4A3728" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Body/shoulders -->
  <path d="M 168 155 Q 170 145 185 142 Q 200 140 215 142 Q 230 145 232 155 L 238 200 Q 210 205 162 200 Z" fill="#7ECBC0" stroke="#5AA8A0" stroke-width="1"/>

  <!-- Arms reaching to desk -->
  <path d="M 168 165 Q 140 180 120 200 Q 115 205 120 208" fill="#7ECBC0" stroke="#5AA8A0" stroke-width="1"/>
  <path d="M 232 165 Q 260 180 280 200 Q 285 205 280 208" fill="#7ECBC0" stroke="#5AA8A0" stroke-width="1"/>

  <!-- Hands on desk -->
  <ellipse cx="120" cy="210" rx="14" ry="8" fill="#F5D6C3" stroke="#C0A08A" stroke-width="1"/>
  <ellipse cx="280" cy="212" rx="14" ry="8" fill="#F5D6C3" stroke="#C0A08A" stroke-width="1"/>

  <!-- Thought bubble -->
  <circle cx="260" cy="105" r="3" fill="#E8DCC8"/>
  <circle cx="272" cy="92" r="4" fill="#E8DCC8"/>
  <ellipse cx="305" cy="72" rx="50" ry="25" fill="#E8DCC8" stroke="#D4C4A8" stroke-width="1"/>
  <text x="305" y="70" text-anchor="middle" fill="#6B5A4E" font-size="11" font-family="Caveat, cursive">if I pop here...</text>
  <text x="305" y="82" text-anchor="middle" fill="#6B5A4E" font-size="11" font-family="Caveat, cursive">B comes off first!</text>
</svg>