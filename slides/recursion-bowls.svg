<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&amp;display=swap');
    text { font-family: 'Caveat', 'Comic Sans MS', cursive; }
  </style>
  <defs>
    <filter id="shadow"><feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.15"/></filter>
  </defs>

  <!-- Warm desk background -->
  <rect width="800" height="500" fill="#E8DCC8" rx="4"/>
  <line x1="0" y1="150" x2="800" y2="153" stroke="#D6CBAE" stroke-width="1.2" opacity="0.4"/>
  <line x1="0" y1="320" x2="800" y2="318" stroke="#D6CBAE" stroke-width="1" opacity="0.35"/>
  <line x1="0" y1="460" x2="800" y2="462" stroke="#D6CBAE" stroke-width="1" opacity="0.4"/>

  <!-- Title pencil annotation -->
  <text x="370" y="38" text-anchor="middle" fill="#555" font-size="26" font-weight="700" font-family="Caveat, cursive" transform="rotate(-0.8, 370, 38)">Recursion: Nesting &amp; Unwinding</text>
  <path d="M 180 44 Q 370 47 560 43" stroke="#555" stroke-width="1" fill="none" opacity="0.35"/>

  <!-- === BOWL 1 (bottom, largest) - sum(1) BASE CASE === -->
  <!-- Construction paper bowl shape -->
  <g filter="url(#shadow)">
    <path d="M 155 415 Q 160 460 290 468 Q 420 460 425 415" stroke="#888" stroke-width="1" fill="#D6E4F0"/>
    <!-- Paper texture lines -->
    <path d="M 180 430 Q 290 450 400 430" stroke="#B8C8D8" stroke-width="0.5" fill="none" opacity="0.3"/>
    <path d="M 170 445 Q 290 462 410 445" stroke="#B8C8D8" stroke-width="0.5" fill="none" opacity="0.3"/>
    <!-- Bowl rim -->
    <ellipse cx="290" cy="415" rx="137" ry="20" fill="#D6E4F0" stroke="#888" stroke-width="1"/>
    <!-- Slight torn edge effect -->
    <path d="M 153 415 Q 155 413 158 416 Q 161 413 164 415" stroke="#888" stroke-width="0.5" fill="none"/>
  </g>
  <!-- Sticky note on bowl 1 -->
  <g filter="url(#shadow)" transform="rotate(3, 290, 430)">
    <path d="M 255 420 L 325 420 L 325 450 Q 322 448 318 450 L 255 450 Z" fill="#F0ECD6" stroke="#D8D0A8" stroke-width="0.5"/>
    <!-- Slight curl on corner -->
    <path d="M 325 450 Q 322 448 318 450" fill="#E8DCC8" stroke="#D8D0A8" stroke-width="0.3"/>
    <text x="290" y="442" text-anchor="middle" fill="#2D2D2D" font-size="18" font-weight="700" font-family="Caveat, cursive">sum(1)</text>
  </g>

  <!-- Red star - base case! -->
  <g transform="translate(290, 478)">
    <path d="M 0 -12 L 3.5 -4 L 12 -4 L 5.5 2 L 8 12 L 0 6 L -8 12 L -5.5 2 L -12 -4 L -3.5 -4 Z" fill="#E85050" stroke="#C03030" stroke-width="1"/>
  </g>
  <text x="290" y="498" text-anchor="middle" fill="#C03030" font-size="16" font-weight="700" font-family="Caveat, cursive" transform="rotate(-1, 290, 498)">base case! returns 1</text>

  <!-- === BOWL 2 - sum(2) === -->
  <g filter="url(#shadow)">
    <path d="M 175 345 Q 180 388 290 393 Q 400 388 405 345" stroke="#888" stroke-width="1" fill="#F0D6D6"/>
    <path d="M 195 360 Q 290 378 385 360" stroke="#E0BABA" stroke-width="0.5" fill="none" opacity="0.3"/>
    <ellipse cx="290" cy="345" rx="117" ry="17" fill="#F0D6D6" stroke="#888" stroke-width="1"/>
  </g>
  <!-- Sticky note on bowl 2 -->
  <g filter="url(#shadow)" transform="rotate(-2, 290, 360)">
    <path d="M 255 350 L 325 350 L 325 378 Q 322 376 318 378 L 255 378 Z" fill="#F0ECD6" stroke="#D8D0A8" stroke-width="0.5"/>
    <path d="M 325 378 Q 322 376 318 378" fill="#E8DCC8" stroke="#D8D0A8" stroke-width="0.3"/>
    <text x="290" y="370" text-anchor="middle" fill="#2D2D2D" font-size="18" font-weight="700" font-family="Caveat, cursive">sum(2)</text>
  </g>

  <!-- === BOWL 3 - sum(3) === -->
  <g filter="url(#shadow)">
    <path d="M 195 275 Q 200 314 290 318 Q 380 314 385 275" stroke="#888" stroke-width="1" fill="#D6F0D6"/>
    <path d="M 212 290 Q 290 305 368 290" stroke="#B8D8B8" stroke-width="0.5" fill="none" opacity="0.3"/>
    <ellipse cx="290" cy="275" rx="97" ry="15" fill="#D6F0D6" stroke="#888" stroke-width="1"/>
  </g>
  <!-- Sticky note on bowl 3 -->
  <g filter="url(#shadow)" transform="rotate(1.5, 290, 290)">
    <path d="M 257 280 L 323 280 L 323 306 Q 320 304 317 306 L 257 306 Z" fill="#F0ECD6" stroke="#D8D0A8" stroke-width="0.5"/>
    <path d="M 323 306 Q 320 304 317 306" fill="#E8DCC8" stroke="#D8D0A8" stroke-width="0.3"/>
    <text x="290" y="298" text-anchor="middle" fill="#2D2D2D" font-size="18" font-weight="700" font-family="Caveat, cursive">sum(3)</text>
  </g>

  <!-- === BOWL 4 (top) - sum(4) === -->
  <g filter="url(#shadow)">
    <path d="M 218 195 Q 223 228 290 232 Q 357 228 362 195" stroke="#888" stroke-width="1" fill="#F0ECD6"/>
    <path d="M 232 208 Q 290 220 348 208" stroke="#E0D8B0" stroke-width="0.5" fill="none" opacity="0.3"/>
    <ellipse cx="290" cy="195" rx="74" ry="13" fill="#F0ECD6" stroke="#888" stroke-width="1"/>
  </g>
  <!-- Sticky note on bowl 4 -->
  <g filter="url(#shadow)" transform="rotate(-1, 290, 210)">
    <path d="M 259 202 L 321 202 L 321 226 Q 318 224 315 226 L 259 226 Z" fill="#F0ECD6" stroke="#D8D0A8" stroke-width="0.5"/>
    <path d="M 321 226 Q 318 224 315 226" fill="#E8DCC8" stroke="#D8D0A8" stroke-width="0.3"/>
    <text x="290" y="219" text-anchor="middle" fill="#2D2D2D" font-size="18" font-weight="700" font-family="Caveat, cursive">sum(4)</text>
  </g>

  <!-- Small doodle hand (60%) placing top bowl -->
  <g transform="translate(340, 100) scale(0.6)">
    <path d="M 10 80 Q 0 68 -5 48 Q -8 28 0 16 Q 10 6 20 12 Q 24 -2 35 -6 Q 48 -4 50 8 Q 58 -2 68 0 Q 78 6 78 20 Q 82 10 90 12 Q 98 18 96 34 Q 94 54 88 74 Q 84 94 78 114 Q 72 130 60 142 Q 46 150 30 148 Q 16 144 12 130 Q 8 115 10 100 Z" fill="#F5D6C3" stroke="#2D2D2D" stroke-width="2" fill-opacity="0.9"/>
    <path d="M 20 16 Q 22 28 24 36" stroke="#2D2D2D" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M 48 8 Q 50 20 51 28" stroke="#2D2D2D" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M 72 14 Q 74 24 74 32" stroke="#2D2D2D" stroke-width="1" fill="none" opacity="0.4"/>
  </g>

  <!-- "Calling down" arrow (pencil, left side) -->
  <g>
    <path d="M 110 175 Q 108 260 110 420" stroke="#555" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="6,4"/>
    <path d="M 103 410 L 110 428 L 117 410" fill="none" stroke="#555" stroke-width="2"/>
    <text x="88" y="310" text-anchor="middle" fill="#555" font-size="18" font-weight="700" font-family="Caveat, cursive" transform="rotate(-90, 88, 310)">calling down</text>
  </g>

  <!-- "Unwinding" arrow (pencil, right side) -->
  <g>
    <path d="M 490 440 Q 530 425 545 380 Q 560 335 555 290 Q 548 245 535 210 Q 522 185 505 170" stroke="#555" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="6,4"/>
    <path d="M 512 178 L 502 165 L 500 182" fill="none" stroke="#555" stroke-width="2"/>
    <text x="575" y="300" text-anchor="middle" fill="#555" font-size="20" font-weight="700" font-family="Caveat, cursive" transform="rotate(1, 575, 300)">unwinding!</text>
  </g>

  <!-- Return values as small torn paper scraps -->
  <g filter="url(#shadow)" transform="rotate(2, 540, 420)">
    <rect x="498" y="410" width="84" height="24" rx="2" fill="white" stroke="#bbb" stroke-width="0.5"/>
    <text x="540" y="428" text-anchor="middle" fill="#555" font-size="14" font-family="Caveat, cursive">returns 1</text>
  </g>
  <g filter="url(#shadow)" transform="rotate(-1, 558, 375)">
    <rect x="498" y="365" width="120" height="24" rx="2" fill="white" stroke="#bbb" stroke-width="0.5"/>
    <text x="558" y="383" text-anchor="middle" fill="#555" font-size="14" font-family="Caveat, cursive">returns 1+2 = 3</text>
  </g>
  <g filter="url(#shadow)" transform="rotate(1.5, 562, 325)">
    <rect x="498" y="315" width="128" height="24" rx="2" fill="white" stroke="#bbb" stroke-width="0.5"/>
    <text x="562" y="333" text-anchor="middle" fill="#555" font-size="14" font-family="Caveat, cursive">returns 3+3 = 6</text>
  </g>
  <g filter="url(#shadow)" transform="rotate(-2, 558, 265)">
    <rect x="490" y="255" width="136" height="24" rx="2" fill="white" stroke="#bbb" stroke-width="0.5"/>
    <text x="558" y="273" text-anchor="middle" fill="#555" font-size="14" font-family="Caveat, cursive">returns 6+4 = 10</text>
  </g>

  <!-- Final answer - torn paper circle -->
  <g filter="url(#shadow)">
    <ellipse cx="640" cy="155" rx="68" ry="38" fill="#F0ECD6" stroke="#bbb" stroke-width="0.5"/>
    <text x="640" y="150" text-anchor="middle" fill="#555" font-size="18" font-weight="700" font-family="Caveat, cursive">answer:</text>
    <text x="640" y="175" text-anchor="middle" fill="#C03030" font-size="28" font-weight="700" font-family="Caveat, cursive">10!</text>
  </g>
  <!-- Tape holding answer -->
  <rect x="620" y="120" width="42" height="14" rx="2" fill="#F5E8A0" opacity="0.55" transform="rotate(-10, 641, 127)" stroke="#E0D080" stroke-width="0.5"/>

  <!-- Scattered paper scraps -->
  <rect x="680" y="460" width="20" height="12" rx="1" fill="#D6E4F0" opacity="0.35" transform="rotate(18, 690, 466)"/>
  <rect x="60" y="470" width="18" height="10" rx="1" fill="#F0D6D6" opacity="0.3" transform="rotate(-12, 69, 475)"/>
</svg>