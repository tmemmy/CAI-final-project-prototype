<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Professor cat avatar holding a pencil">
  <defs>
    <style>
      .line {
        stroke: #111111;
        stroke-width: 12;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .thin {
        stroke: #111111;
        stroke-width: 8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>

  <!-- background badge -->
  <circle cx="256" cy="256" r="228" fill="#F8F3E8" class="line"/>

  <!-- ears -->
  <path d="M152 145 L120 72 L198 118 Z" fill="#F2B7A8" class="line"/>
  <path d="M360 145 L392 72 L314 118 Z" fill="#F2B7A8" class="line"/>

  <!-- head -->
  <circle cx="256" cy="205" r="124" fill="#FFF8EF" class="line"/>

  <!-- forehead fur -->
  <path d="M220 116 Q235 98 256 122 Q277 98 292 116" fill="none" class="thin"/>

  <!-- glasses -->
  <circle cx="212" cy="198" r="34" fill="#FFFFFF" class="line"/>
  <circle cx="300" cy="198" r="34" fill="#FFFFFF" class="line"/>
  <path d="M246 198 L266 198" fill="none" class="line"/>
  <path d="M178 188 Q162 182 152 190" fill="none" class="thin"/>
  <path d="M334 188 Q350 182 360 190" fill="none" class="thin"/>

  <!-- eyes -->
  <ellipse cx="212" cy="204" rx="10" ry="14" fill="#111111"/>
  <ellipse cx="300" cy="204" rx="10" ry="14" fill="#111111"/>

  <!-- brows -->
  <path d="M188 165 Q212 153 236 165" fill="none" class="thin"/>
  <path d="M276 165 Q300 153 324 165" fill="none" class="thin"/>

  <!-- nose and muzzle -->
  <path d="M244 226 L268 226 L256 238 Z" fill="#E39C93" class="thin"/>
  <path d="M256 238 L256 252" fill="none" class="thin"/>
  <path d="M256 252 Q236 268 214 258" fill="none" class="thin"/>
  <path d="M256 252 Q276 268 298 258" fill="none" class="thin"/>

  <!-- whiskers -->
  <path d="M188 236 L132 226" fill="none" class="thin"/>
  <path d="M188 252 L126 252" fill="none" class="thin"/>
  <path d="M188 268 L132 278" fill="none" class="thin"/>
  <path d="M324 236 L380 226" fill="none" class="thin"/>
  <path d="M324 252 L386 252" fill="none" class="thin"/>
  <path d="M324 268 L380 278" fill="none" class="thin"/>

  <!-- body / shoulders -->
  <path d="M150 334 Q170 290 218 284 L294 284 Q342 290 362 334 L362 414 L150 414 Z" fill="#FFF8EF" class="line"/>

  <!-- shirt -->
  <path d="M220 284 L292 284 L278 336 L234 336 Z" fill="#FFFFFF" class="line"/>

  <!-- tie -->
  <path d="M256 292 L278 320 L256 346 L234 320 Z" fill="#8B1E2D" class="thin"/>
  <path d="M256 346 L278 404 L234 404 Z" fill="#B3263A" class="thin"/>

  <!-- arm holding pencil -->
  <path d="M330 320 Q388 300 420 334" fill="none" class="line"/>
  <path d="M404 320 L462 262" fill="none" class="line"/>

  <!-- pencil -->
  <g transform="rotate(-18 432 292)">
    <rect x="380" y="276" width="94" height="24" rx="10" fill="#F4C542" class="thin"/>
    <rect x="380" y="276" width="18" height="24" rx="8" fill="#E87D7D" class="thin"/>
    <path d="M474 276 L498 288 L474 300 Z" fill="#E8D0A8" class="thin"/>
    <path d="M492 285 L502 288 L492 291 Z" fill="#111111" class="thin"/>
  </g>

  <!-- left paw -->
  <path d="M180 334 Q152 350 150 382 Q178 388 202 374" fill="#FFF8EF" class="line"/>

  <!-- right paw gripping pencil -->
  <path d="M360 330 Q388 332 402 350 Q390 372 360 370" fill="#FFF8EF" class="line"/>
  <path d="M374 342 Q384 350 388 360" fill="none" class="thin"/>

  <!-- tiny professor flair: collar points -->
  <path d="M220 284 L244 320 L220 320 Z" fill="#FFFFFF" class="thin"/>
  <path d="M292 284 L268 320 L292 320 Z" fill="#FFFFFF" class="thin"/>
</svg>
