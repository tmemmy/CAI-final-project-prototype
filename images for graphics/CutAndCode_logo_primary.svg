<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CutAndCode primary logo">
  <defs>
    <style>
      .brand {
        font-family: "Caveat", "Comic Sans MS", cursive;
        font-size: 190px;
        font-weight: 700;
        fill: #6B9CC4;
      }
      .line {
        stroke: #6B9CC4;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .solid {
        stroke-width: 14;
      }
      .dotted {
        stroke-width: 8;
        stroke-dasharray: 10 16;
      }
      .code {
        font-family: "Quicksand", "Nunito", Arial, sans-serif;
        font-size: 96px;
        font-weight: 700;
        fill: #6B9CC4;
      }
    </style>
  </defs>

  <!-- Open scissors as the C -->
  <g transform="translate(72,92)">
    <!-- handle rings -->
    <circle cx="48" cy="136" r="28" class="line solid"/>
    <circle cx="48" cy="248" r="28" class="line solid"/>

    <!-- pivot -->
    <circle cx="112" cy="192" r="10" fill="#6B9CC4"/>

    <!-- upper blade / C arc -->
    <path d="M132 182
             C 255 120, 330 70, 420 54"
          class="line solid"/>

    <path d="M215 45
             C 125 35, 88 95, 91 170"
          class="line solid"/>

    <!-- lower blade / C arc -->
    <path d="M132 202
             C 255 262, 330 314, 420 330"
          class="line solid"/>

    <path d="M215 339
             C 125 349, 88 289, 91 214"
          class="line solid"/>

    <!-- handle connectors -->
    <path d="M76 136 C 88 148, 98 160, 112 182" class="line solid"/>
    <path d="M76 248 C 88 236, 98 224, 112 202" class="line solid"/>
  </g>

  <!-- Dotted line across the full wordmark -->
  <path d="M176 210 C 500 210, 870 210, 1355 210" class="line dotted"/>

  <!-- Wordmark split so line can run through it visually -->
  <text x="340" y="245" class="brand">utAndCode</text>

  <!-- Code mark -->
  <text x="1368" y="242" class="code">&lt;/&gt;</text>
</svg>
